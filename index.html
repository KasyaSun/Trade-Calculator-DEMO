<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNTD Values | Trade Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #00f2ff;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --loss: #ff4757;
            --win: #00ff88;
            /* Цвета категорий */
            --cosmic: #ff00ff;
            --secret: #ff4757;
            --nightmare: #7000ff;
            --items: #ffd700;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.02) 0%, transparent 100%);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; min-height: 100vh; -webkit-font-smoothing: antialiased;
        }

        /* --- NAVIGATION --- */
        .main-nav {
            position: fixed; top: 0; width: 100%; height: 80px;
            display: flex; align-items: center; z-index: 1000;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px); background: rgba(11, 14, 20, 0.8);
        }
        .nav-container { width: 100%; max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; }
        .logo { font-weight: 800; font-size: 1.5rem; text-decoration: none; color: #fff; letter-spacing: -1.5px; }
        .logo span { color: var(--accent); }

        .nav-links { display: flex; list-style: none; gap: 35px; align-items: center; padding: 0; margin: 0; }
        .nav-links a { text-decoration: none; color: var(--text-dim); font-weight: 800; font-size: 0.85rem; text-transform: uppercase; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; }

        .dropdown { position: relative; }
        .dropdown-trigger { color: var(--text-dim); font-weight: 800; font-size: 0.85rem; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .dropdown:hover .dropdown-trigger { color: #fff; }
        .dropdown-menu {
            position: absolute; top: 100%; left: 50%; transform: translateX(-50%) translateY(15px);
            background: #151921; border: 1px solid var(--border); border-radius: 12px; padding: 10px; min-width: 160px;
            opacity: 0; visibility: hidden; transition: 0.2s; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .dropdown:hover .dropdown-menu { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(5px); }
        .dropdown-menu a { display: block; padding: 10px; font-size: 0.8rem; color: var(--text-dim); text-transform: none; border-radius: 8px; font-weight: 800; text-align: center; }
        .dropdown-menu a:hover { background: rgba(255,255,255,0.05); color: var(--accent); }

        /* --- CALCULATOR --- */
        .calc-wrapper { max-width: 1100px; margin: 130px auto 40px; padding: 0 20px; }
        .status-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 30px; }
        #trade-status { margin: 0; font-weight: 800; font-size: 1.4rem; letter-spacing: 1px; color: var(--text-dim); }

        .trade-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .trade-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 28px; padding: 25px; display: flex; flex-direction: column; height: 600px; position: relative; }
        .trade-box h3 { font-size: 0.75rem; text-transform: uppercase; color: var(--text-dim); text-align: center; margin-bottom: 25px; font-weight: 800; letter-spacing: 2px; }

        .unit-slots { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding-bottom: 110px; }
        .added-unit { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 16px; padding: 12px; display: flex; align-items: center; gap: 15px; }
        .added-unit img { width: 50px; height: 50px; object-fit: contain; }
        .added-unit .info { flex: 1; }
        .added-unit .name { font-weight: 800; font-size: 0.9rem; margin-bottom: 2px; }
        .added-unit .price { font-weight: 800; font-size: 0.85rem; color: var(--accent); }

        .box-footer { position: absolute; bottom: 25px; left: 25px; right: 25px; }
        .total-row { display: flex; justify-content: space-between; align-items: center; padding-top: 15px; border-top: 1px solid var(--border); margin-bottom: 15px; }
        .total-row span:last-child { font-weight: 800; font-size: 2rem; color: var(--accent); }

        .add-trigger { background: var(--accent); color: #000; border: none; padding: 18px; border-radius: 16px; font-weight: 800; width: 100%; cursor: pointer; text-transform: uppercase; }

        /* --- MODAL --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: #151921; border: 1px solid var(--border); width: 90%; max-width: 850px; border-radius: 32px; padding: 35px; }

        .cat-tabs { display: flex; gap: 20px; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 15px; overflow-x: auto; }
        .tab { font-weight: 800; font-size: 0.9rem; color: var(--text-dim); cursor: pointer; white-space: nowrap; }
        .tab.active { color: var(--accent); }

        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; max-height: 400px; overflow-y: auto; }
        .catalog-item { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 20px; padding: 15px; text-align: center; cursor: pointer; }
        .catalog-item img { width: 80px; height: 80px; object-fit: contain; margin-bottom: 10px; }

        .oc-text { background: linear-gradient(45deg, #ffd700, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900 !important; }

        #type-view { display: none; flex-direction: column; align-items: center; }
        .type-options { display: flex; gap: 20px; margin: 30px 0; }
        .type-opt { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 25px; border-radius: 22px; cursor: pointer; min-width: 160px; text-align: center; }
        .btn-back { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 10px 25px; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 0.75rem; }

        @media (max-width: 768px) { .trade-grid { grid-template-columns: 1fr; } .nav-links { display: none; } }
    </style>
</head>

        let currentSide = 'left', trade = { left: [], right: [] }, activeUnit = null;
        function formatPrice(p) { return p === "O/C" ? "O/C" : p.toLocaleString(); }
        function priceToMath(p) { return p === "O/C" ? 999999999 : (parseFloat(p) || 0); }
        function openCatalog(side) { currentSide = side; document.getElementById('catModal').style.display = 'flex'; backToCatalog(); loadCat('cosmic'); }
        function closeCatalog() { document.getElementById('catModal').style.display = 'none'; }

        function loadCat(cat) {
            document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.innerText.toLowerCase() === cat));
            const filtered = units.filter(u => u.cat === cat);
            document.getElementById('catGrid').innerHTML = filtered.map(u => `
                <div class="catalog-item" onclick="startAddProcess('${u.name}')">
                    <img src="${u.img}"><span style="display:block; font-weight:800; font-size:0.8rem;">${u.name}</span>
                    <span class="${u.val === 'O/C' ? 'oc-text' : ''}" style="font-weight:800; font-size:0.75rem; color:var(--accent)">${formatPrice(u.val)}</span>
                </div>
            `).join('');
        }

        function startAddProcess(name) {
            activeUnit = units.find(u => u.name === name);
            document.getElementById('catalog-view').style.display = 'none';
            document.getElementById('type-view').style.display = 'flex';
            document.getElementById('sel-name').innerText = activeUnit.name;
            const pNorm = document.getElementById('p-norm'), pShiny = document.getElementById('p-shiny');
            pNorm.innerText = formatPrice(activeUnit.val); pShiny.innerText = formatPrice(activeUnit.sval);
            pNorm.className = activeUnit.val === "O/C" ? "oc-text" : ""; pShiny.className = activeUnit.sval === "O/C" ? "oc-text" : "";
        }

        function confirmAdd(isShiny) {
            trade[currentSide].push({ ...activeUnit, displayName: isShiny ? activeUnit.name + " ✨" : activeUnit.name, displayVal: isShiny ? activeUnit.sval : activeUnit.val, iid: Date.now() + Math.random() });
            closeCatalog(); updateUI();
        }

        function backToCatalog() { document.getElementById('catalog-view').style.display = 'block'; document.getElementById('type-view').style.display = 'none'; }
        function removeUnit(side, iid) { trade[side] = trade[side].filter(u => u.iid !== iid); updateUI(); }

        function updateUI() {
            ['left', 'right'].forEach(side => {
                let sum = 0, hasOC = false;
                trade[side].forEach(u => { if (u.displayVal === "O/C") hasOC = true; else sum += u.displayVal; });
                document.getElementById(`total-${side}`).innerText = hasOC ? "O/C" : sum.toLocaleString();
                document.getElementById(`total-${side}`).className = hasOC ? "oc-text" : "";
                document.getElementById(`slots-${side}`).innerHTML = trade[side].map(u => `
                    <div class="added-unit" style="border-left: 4px solid var(--${u.cat})">
                        <img src="${u.img}"><div class="info"><div class="name">${u.displayName}</div><div class="price ${u.displayVal === 'O/C' ? 'oc-text' : ''}">${formatPrice(u.displayVal)}</div></div>
                        <div style="cursor:pointer" onclick="removeUnit('${side}', ${u.iid})">✕</div>
                    </div>
                `).join('');
            });
            const vL = trade.left.reduce((a, u) => a + priceToMath(u.displayVal), 0), vR = trade.right.reduce((a, u) => a + priceToMath(u.displayVal), 0);
            const status = document.getElementById('trade-status');
            if (vL === 0 && vR === 0) { status.innerText = "SELECT UNITS"; status.style.color = "var(--text-dim)"; }
            else {
                const r = vR / (vL || 1);
                if (r >= 0.9 && r <= 1.1) { status.innerText = "FAIR TRADE"; status.style.color = "#fff"; }
                else if (r > 1.1) { status.innerText = "WIN"; status.style.color = "var(--win)"; }
                else { status.innerText = "LOSE"; status.style.color = "var(--loss)"; }
            }
        }
    </script>
</body>
</html>
